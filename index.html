<!DOCTYPE html>
<html>
<head>
  <title>Price Calculator</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 60px auto; }
    input { display: block; width: 100%; margin-bottom: 12px; padding: 8px; }
    button { padding: 10px 16px; cursor: pointer; }
    #result { margin-top: 20px; font-size: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Price Calculator</h2>

  <label>Base Price</label>
  <input type="number" id="basePrice" value="1200">

  <label>Discount %</label>
  <input type="number" id="discount" value="20">

  <label>Tax %</label>
  <input type="number" id="tax" value="18">

  <button onclick="calculate()">Calculate</button>

  <div id="result"></div>

  <script>
    async function calculate() {
      const basePrice = document.getElementById("basePrice").value;
      const discount = document.getElementById("discount").value;
      const tax = document.getElementById("tax").value;

      // PASTE YOUR RENDER URL BELOW, replacing the example one
      const apiUrl = "https://price-api-cpkf.onrender.com";

      const response = await fetch(
        `${apiUrl}/price?base_price=${basePrice}&discount_percent=${discount}&tax_percent=${tax}`
      );
      const data = await response.json();

      document.getElementById("result").innerText =
        "Final Price: ₹" + data.final_price;
    }
  </script>
</body>
</html>
